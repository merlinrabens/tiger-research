<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="tiger-research: parallel tigers synthesized into one playbook">
  <defs>
    <style>
      .lbl{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#cbd5e1;font-size:20px}
      .big{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f1f5f9;font-size:36px;font-weight:700}
      .sub{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8;font-size:17px}
      .tg{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0b0f17;font-size:20px;font-weight:700}
      .di{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;fill:#cbd5e1;font-size:18px}
    </style>
  </defs>

  <rect width="1200" height="440" fill="#0b0f17"/>
  <text x="60" y="66" class="big">🐯 tiger-research</text>
  <text x="60" y="96" class="sub">parallel multi-source research · non-overlapping mandates · one synthesized playbook</text>

  <!-- 5 parallel tigers: label LEFT of the node (right-aligned), so the
       convergence lines (which exit the node rightward) never cross text -->
  <g>
    <g transform="translate(250,170)"><text x="-46" y="7" text-anchor="end" class="lbl">docs</text><circle r="27" fill="#ff6a33"/><text x="0" y="7" text-anchor="middle" class="tg">A</text></g>
    <g transform="translate(250,230)"><text x="-46" y="7" text-anchor="end" class="lbl">setup</text><circle r="27" fill="#ff6a33"/><text x="0" y="7" text-anchor="middle" class="tg">B</text></g>
    <g transform="translate(250,290)"><text x="-46" y="7" text-anchor="end" class="lbl">community</text><circle r="27" fill="#ff6a33"/><text x="0" y="7" text-anchor="middle" class="tg">C</text></g>
    <g transform="translate(250,350)"><text x="-46" y="7" text-anchor="end" class="lbl">domain</text><circle r="27" fill="#ff6a33"/><text x="0" y="7" text-anchor="middle" class="tg">D</text></g>
    <g transform="translate(250,410)"><text x="-46" y="7" text-anchor="end" class="lbl">critique</text><circle r="27" fill="#ff6a33"/><text x="0" y="7" text-anchor="middle" class="tg">E</text></g>
  </g>

  <!-- convergence to one node (lines start at the node's right edge) -->
  <g stroke="#ff6a33" stroke-width="2.5" opacity="0.5" fill="none">
    <path d="M277 170 C 520 170 560 285 706 290"/>
    <path d="M277 230 C 520 230 580 288 706 290"/>
    <path d="M277 290 C 520 290 590 290 706 290"/>
    <path d="M277 350 C 520 350 580 292 706 290"/>
    <path d="M277 410 C 520 410 560 295 706 290"/>
  </g>

  <!-- synthesis node -->
  <g transform="translate(760,290)">
    <path d="M0 -56 L56 0 L0 56 L-56 0 Z" fill="none" stroke="#ff6a33" stroke-width="3"/>
    <text x="0" y="-3" text-anchor="middle" class="di">cross-</text>
    <text x="0" y="21" text-anchor="middle" class="di">validate</text>
  </g>

  <!-- arrow -->
  <g stroke="#ff6a33" stroke-width="3" fill="none">
    <path d="M820 290 L925 290"/><path d="M912 280 L925 290 L912 300"/>
  </g>

  <!-- playbook doc -->
  <g transform="translate(935,212)">
    <text x="110" y="-16" text-anchor="middle" class="lbl">playbook.md</text>
    <rect width="220" height="155" rx="10" fill="none" stroke="#ff6a33" stroke-width="3"/>
    <line x1="24" y1="42" x2="150" y2="42" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
    <line x1="24" y1="70" x2="196" y2="70" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="92" x2="196" y2="92" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="114" x2="160" y2="114" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="136" x2="120" y2="136" stroke="#ff6a33" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
